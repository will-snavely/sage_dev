services:
  web:
    depends_on:
      - db
    image: "horsecatdog/${PROJECT}:latest"
    restart: always
    environment:
      BEDROCK_ROOT: "/www/srv"
      WORDPRESS_DB_HOST: "db:3306"
      WORDPRESS_DB: ${WORDPRESS_DB}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/db_password_prod
      WP_SITE_TITLE: ${WP_SITE_TITLE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WP_ADMIN_PASSWORD_FILE: /run/secrets/wp_admin_password_prod
      WEB_HOSTNAME: ${WEB_HOSTNAME}
      WEB_PORT: ${WEB_PORT_HTTP}
      WEB_PROTOCOL: ${WEB_PROTOCOL}
      PROJECT: ${PROJECT}
      THEME: ${THEME}
    volumes:
      - ./scripts:/app/scripts
    secrets:
      - db_password_prod
      - wp_admin_password_prod
    networks:
      - prod_network

  db:
    image: "mariadb:latest"
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/db_root_password_prod
      MARIADB_DATABASE: wordpress_prod
      MARIADB_USER: wordpress_prod
      MARIADB_PASSWORD_FILE: /run/secrets/db_password_prod
    volumes:
      - mariadb_prod_data:/var/lib/mysql
    secrets:
      - db_password_prod
      - db_root_password_prod
    networks:
      - prod_network

  proxy:
    depends_on:
      - web
    image: nginx:stable-alpine
    environment:
      USE_HTTPS: ${USE_HTTPS}
      PROXY_PORT_HTTP: ${PROXY_PORT_HTTP}
      PROXY_PORT_HTTPS: ${PROXY_PORT_HTTPS}
      WEB_HOSTNAME: ${WEB_HOSTNAME}
      WEB_PORT: ${WEB_PORT_HTTP}
    ports:
      - "${LOCAL_PORT_HTTP}:${PROXY_PORT_HTTP}"
      - "${LOCAL_PORT_HTTPS}:${PROXY_PORT_HTTPS}"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
      - webroot:/var/www/html
    networks:
      - prod_network

  certbot:
    image: certbot/certbot
    restart: always
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/html
    # Switching to 'command' allows for easy overrides
    command: >
      /bin/sh -c "trap exit TERM; 
      while :; do 
        certbot renew; 
        sleep 12h & wait $${!}; 
      done;"

volumes:
  mariadb_prod_data:
  certbot-etc:
  certbot-var:
  webroot:

networks:
  prod_network:
    driver: bridge

secrets:
  db_password_prod:
    file: ${DB_WORDPRESS_PASSWORD_FILE}
  db_root_password_prod:
    file: ${DB_ROOT_PASSWORD_FILE}
  wp_admin_password_prod:
    file: ${WP_ADMIN_PASSWORD_FILE}
